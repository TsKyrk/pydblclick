name: publish

# Publishes to PyPI via trusted publishing (no API token needed).
# One-time setup on https://pypi.org/manage/account/publishing/ :
#   project name: pyexewrap, owner: TsKyrk, repository: pyexewrap,
#   workflow: publish.yml, environment: pypi
# Then: git tag v0.2.0 && git push --tags

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests before publishing
        run: |
          python -m pip install .[dev]
          python -m pytest tests/
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
